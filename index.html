<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imposter Myanmar Game</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --neon-purple: #bc13fe;
            --bg-dark: #05050b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', 'Pyidaungsu', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.05) 0%, transparent 40%);
        }

        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; z-index: 10; }
        .hidden { display: none !important; }

        h2.title { text-align: center; color: var(--neon-blue); letter-spacing: 4px; font-weight: 900; margin-bottom: 25px; text-shadow: 0 0 10px rgba(0,242,255,0.5); }

        /* SCORE STYLES */
        .score-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-purple);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 10px;
        }
        .score-item { text-align: center; font-size: 0.7rem; border-right: 1px solid #333; }
        .score-item:last-child { border: none; }
        .score-val { display: block; font-size: 1rem; color: var(--neon-blue); font-weight: bold; }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .cat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 2px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cat-card.selected {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .cat-icon { font-size: 1.4rem; margin-bottom: 4px; display: block; }
        .cat-name { font-size: 0.65rem; font-weight: bold; color: #ccc; text-transform: uppercase; }

        .settings-box {
            background: var(--glass);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
            color: white; padding: 12px; border-radius: 12px; font-size: 1rem; box-sizing: border-box;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--neon-blue), #00a2ff);
            color: black; border: none; padding: 18px; border-radius: 15px;
            width: 100%; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3);
            margin-bottom: 10px;
        }

        .btn-outline {
            background: transparent; border: 2px solid var(--neon-red);
            color: var(--neon-red); padding: 15px; border-radius: 15px;
            width: 100%; font-weight: 900; cursor: pointer; margin-bottom: 10px;
        }

        .card-scene { perspective: 1000px; height: 350px; margin: 20px 0; }
        .card {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid rgba(0, 242, 255, 0.2);
            background: linear-gradient(135deg, #0a0a15 0%, #050507 100%);
        }

        .card-front { color: var(--neon-blue); }
        .card-back { transform: rotateY(180deg); border-color: var(--neon-purple); }

        .scan-line {
            width: 100%; height: 2px; background: var(--neon-blue);
            position: absolute; top: 0; left: 0;
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 2s linear infinite;
        }

        @keyframes scan { 0% { top: 10%; opacity: 0; } 50% { opacity: 1; } 100% { top: 90%; opacity: 0; } }

        #word-text { font-size: 2.5rem; font-weight: 900; text-align: center; }
        
        .timer-circle {
            width: 100px; height: 100px; border-radius: 50%;
            border: 4px solid var(--neon-red);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; margin: 15px auto;
            transition: all 0.3s ease;
        }

        .timer-warning { transform: scale(1.2); color: white; background: rgba(255,0,85,0.2); }

        /* VOTE STYLES */
        .vote-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .vote-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            color: white; padding: 15px; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .vote-btn:active { background: var(--neon-red); }

        #reveal-box {
            margin-top: 15px; padding: 20px; background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; border: 2px solid var(--neon-purple); text-align: left;
        }
        .imp-name { color: var(--neon-red); font-weight: bold; text-shadow: 0 0 5px var(--neon-red); }
    </style>
</head>
<body>

    <!-- PAGE 1: SETUP -->
    <div id="page-categories" class="container">
        <h2 class="title">IMPOSTER</h2>
        
        <!-- Scoreboard UI -->
        <div id="scoreboard" class="score-panel hidden"></div>

        <div class="category-grid" id="cat-grid"></div>
        
        <div id="custom-input-box" class="hidden" style="margin-bottom: 20px;">
            <label>Custom Words (ကော်မာ ခြားရေးပါ)</label>
            <textarea id="customWords" placeholder="ဥပမာ- ရန်ကုန်, မန္တလေး, ပုဂံ"></textarea>
        </div>

        <div class="settings-box">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex:1;"><label>Players</label><input type="number" id="playerCount" value="4"></div>
                <div style="flex:1;"><label>Imposters</label><input type="number" id="imposterCount" value="1"></div>
            </div>
            <div><label>ဆွေးနွေးချိန် (Seconds)</label><input type="number" id="discTime" value="60"></div>
        </div>
        <button class="btn-main" onclick="initGame()">START MISSION</button>
    </div>

    <!-- PAGE 2: CARD REVEAL -->
    <div id="page-game" class="container hidden">
        <div id="player-label" style="text-align: center; font-size: 1.5rem; color: var(--neon-blue);">PLAYER 1</div>
        <div class="card-scene">
            <div class="card" id="main-card" onclick="handleFlip()">
                <div class="card-face card-front">
                    <div class="scan-line"></div><div style="font-size: 3rem;">🔐</div>
                    <p style="text-transform: uppercase; font-size: 0.7rem; margin-top: 15px;">Tap to Decrypt</p>
                </div>
                <div class="card-face card-back">
                    <p id="word-text">WORD</p><p id="hint-text" style="color:#888; font-size: 0.8rem; margin-top: 10px;">Hint</p>
                </div>
            </div>
        </div>
        <button class="btn-main hidden" id="next-player-btn" onclick="goToNextPlayer()">NEXT PLAYER ➔</button>
    </div>

    <!-- PAGE 3: DISCUSSION & VOTE -->
    <div id="page-discussion" class="container hidden" style="text-align: center;">
        <h2 class="title" id="phase-title" style="color: var(--neon-red);">DEBATE</h2>
        
        <div id="debate-ui">
            <div class="settings-box">
                <p style="color: #888; font-size: 0.7rem;">စပြောရမည့်သူ:</p>
                <h1 id="starter-name" style="margin: 5px 0; font-size: 1.8rem;">Player 1</h1>
            </div>
            <div class="timer-circle" id="timer-val">60</div>
            <button class="btn-main" onclick="startVotingPhase()">VOTE NOW</button>
        </div>

        <div id="vote-ui" class="hidden">
            <p id="voter-label" style="color: var(--neon-blue); font-weight: bold;">PLAYER 1: WHO IS THE IMPOSTER?</p>
            <div class="vote-grid" id="vote-buttons"></div>
        </div>

        <div id="reveal-box" class="hidden"></div>
        <button class="btn-main hidden" id="reset-btn" style="margin-top:20px;" onclick="backToMenu()">NEXT ROUND</button>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBuzzer(freq, duration, type = 'sine') {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const allCategories = {
        mix: { n: "Random", i: "🎲", list: [] },
        fest: { n: "Festivals", i: "🎆", list: ["သင်္ကြန်", "သီတင်းကျွတ်", "တန်ဆောင်တိုင်", "ကဆုန်ညောင်ရေသွန်း"], h: "မြန်မာ့ရိုးရာပွဲ" },
        anim: { n: "Animals", i: "🐘", list: ["ဆင်", "ကျား", "ခြင်္သေ့", "ဒေါင်း", "မျောက်", "မြွေ"], h: "တိရစ္ဆာန်" },
        food: { n: "Food", i: "🍜", list: ["မုန့်ဟင်းခါး", "အုန်းနို့ခေါက်ဆွဲ", "လက်ဖက်သုပ်", "ရှမ်းခေါက်ဆွဲ"], h: "စားစရာ" },
        place: { n: "Places", i: "⛩️", list: ["ရွှေတိဂုံ", "ပုဂံ", "အင်းလေး", "ကျိုက်ထီးရိုး"], h: "နေရာ" },
        job: { n: "Jobs", i: "💼", list: ["ဆရာဝန်", "အင်ဂျင်နီယာ", "စစ်သား", "ရဲ", "ကျောင်းဆရာ"], h: "အလုပ်အကိုင်" },
        tech: { n: "Tech", i: "💻", list: ["iPhone", "Facebook", "Laptop", "Internet"], h: "နည်းပညာ" },
        sport: { n: "Sports", i: "⚽", list: ["ဘောလုံး", "ခြင်းလုံး", "လက်ဝှေ့", "ရေကူး"], h: "အားကစား" },
        movie: { n: "Movies", i: "🎬", list: ["Spider-Man", "Titanic", "Avatar", "Batman"], h: "ရုပ်ရှင်" },
        celeb: { n: "Celebs", i: "🌟", list: ["စိုင်းစိုင်း", "နေတိုး", "ဖွေးဖွေး", "ဝတ်မှုံရွှေရည်"], h: "အနုပညာရှင်" },
        drink: { n: "Drinks", i: "🍹", list: ["ကော်ဖီ", "လက်ဖက်ရည်", "ဘီယာ", "ဝိုင်"], h: "သောက်စရာ" },
        body: { n: "Body", i: "🧠", list: ["ဦးနှောက်", "နှလုံး", "မျက်လုံး", "ကျောရိုး"], h: "ခန္ဓာကိုယ်" },
        anime: { n: "Anime", i: "👺", list: ["One Piece", "Naruto", "Detective Conan", "Dragon Ball", "Doraemon", "Death Note", "Attack on Titan"], h: "မြန်မာစာတန်းထိုး Anime" },
        brand: { n: "Brands", i: "💎", list: ["Samsung", "Nike", "Adidas", "Toyota"], h: "ကမ္ဘာကျော်တံဆိပ်" },
        travel: { n: "Travel", i: "✈️", list: ["Passport", "Suitcase", "Hotel", "Beach"], h: "ခရီးသွားခြင်း" },
        custom: { n: "Custom", i: "✏️", list: [], h: "Custom Word" }
    };

    let selectedCat = 'mix', currentWord = '', scores = {}, clock;
    let gameState = { players: [], current: 0, isFlipped: false, votes: {}, voterIndex: 0 };

    const grid = document.getElementById('cat-grid');
    Object.keys(allCategories).forEach(key => {
        const div = document.createElement('div');
        div.className = `cat-card ${key === 'mix' ? 'selected' : ''}`;
        div.id = `cat-${key}`;
        div.innerHTML = `<span class="cat-icon">${allCategories[key].i}</span><span class="cat-name">${allCategories[key].n}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
            div.classList.add('selected'); selectedCat = key;
            document.getElementById('custom-input-box').classList.toggle('hidden', key !== 'custom');
        };
        grid.appendChild(div);
    });

    function initGame() {
        const pCount = parseInt(document.getElementById('playerCount').value);
        const iCount = parseInt(document.getElementById('imposterCount').value);
        
        // Initialize scores for new players
        for(let i=1; i<=pCount; i++) { if(!scores[i]) scores[i] = 0; }

        let wordList = [];
        let hint = "";

        if(selectedCat === 'custom') {
            wordList = document.getElementById('customWords').value.split(',').map(s => s.trim()).filter(s => s !== "");
            if(wordList.length === 0) return alert("Custom word ထည့်ပါ");
            hint = "Custom Word";
        } else {
            let targetKey = selectedCat === 'mix' ? Object.keys(allCategories).filter(k => k !== 'mix' && k !== 'custom')[Math.floor(Math.random() * 14)] : selectedCat;
            wordList = allCategories[targetKey].list;
            hint = allCategories[targetKey].h;
        }

        currentWord = wordList[Math.floor(Math.random() * wordList.length)];
        let deck = [];
        for(let i=0; i < (pCount - iCount); i++) deck.push({ w: currentWord, h: "မှတ်ထားပါ။", imp: false });
        for(let i=0; i < iCount; i++) deck.push({ w: "IMPOSTER", h: `Hint: ${hint}`, imp: true });
        gameState.players = deck.sort(() => Math.random() - 0.5).map((p, idx) => ({...p, id: idx + 1}));
        gameState.current = 0;
        document.getElementById('page-categories').classList.add('hidden');
        document.getElementById('page-game').classList.remove('hidden');
        updateGameUI();
    }

    function updateGameUI() {
        gameState.isFlipped = false;
        const p = gameState.players[gameState.current];
        document.getElementById('player-label').innerText = `PLAYER ${p.id}`;
        document.getElementById('word-text').innerText = p.w;
        document.getElementById('hint-text').innerText = p.h;
        document.getElementById('word-text').style.color = p.imp ? 'var(--neon-red)' : 'var(--neon-blue)';
        document.getElementById('main-card').classList.remove('is-flipped');
        document.getElementById('next-player-btn').classList.add('hidden');
    }

    function handleFlip() {
        const card = document.getElementById('main-card');
        const nextBtn = document.getElementById('next-player-btn');
        if (!gameState.isFlipped) { gameState.isFlipped = true; card.classList.add('is-flipped'); }
        else { gameState.isFlipped = false; card.classList.remove('is-flipped'); setTimeout(() => { if(!gameState.isFlipped) nextBtn.classList.remove('hidden'); }, 300); }
    }

    function goToNextPlayer() {
        gameState.current++;
        if (gameState.current < gameState.players.length) updateGameUI();
        else showDiscussion();
    }

    function showDiscussion() {
        document.getElementById('page-game').classList.add('hidden');
        document.getElementById('page-discussion').classList.remove('hidden');
        document.getElementById('starter-name').innerText = `Player ${gameState.players[Math.floor(Math.random()*gameState.players.length)].id}`;
        let time = parseInt(document.getElementById('discTime').value);
        const timerEl = document.getElementById('timer-val');
        clock = setInterval(() => {
            time--; timerEl.innerText = time;
            if (time <= 5 && time > 0) { timerEl.classList.add('timer-warning'); playBuzzer(800, 0.1); }
            if (time <= 0) { clearInterval(clock); startVotingPhase(); }
        }, 1000);
    }

    function startVotingPhase() {
        clearInterval(clock);
        document.getElementById('debate-ui').classList.add('hidden');
        document.getElementById('vote-ui').classList.remove('hidden');
        document.getElementById('phase-title').innerText = "VOTING TIME";
        gameState.voterIndex = 0;
        gameState.votes = {};
        renderVoteButtons();
    }

    function renderVoteButtons() {
        const p = gameState.players[gameState.voterIndex];
        document.getElementById('voter-label').innerText = `PLAYER ${p.id}: WHO IS THE IMPOSTER?`;
        const container = document.getElementById('vote-buttons');
        container.innerHTML = "";
        gameState.players.forEach(player => {
            if(player.id === p.id) return;
            const btn = document.createElement('button');
            btn.className = "vote-btn";
            btn.innerText = `PLAYER ${player.id}`;
            btn.onclick = () => registerVote(player.id);
            container.appendChild(btn);
        });
    }

    function registerVote(targetId) {
        gameState.votes[targetId] = (gameState.votes[targetId] || 0) + 1;
        gameState.voterIndex++;
        if(gameState.voterIndex < gameState.players.length) renderVoteButtons();
        else showResults();
    }

    function showResults() {
        document.getElementById('vote-ui').classList.add('hidden');
        document.getElementById('phase-title').innerText = "RESULTS";
        
        let maxVotes = 0;
        let kickedId = null;
        for(let id in gameState.votes) {
            if(gameState.votes[id] > maxVotes) {
                maxVotes = gameState.votes[id];
                kickedId = id;
            }
        }

        const kickedPlayer = gameState.players.find(p => p.id == kickedId);
        const imps = gameState.players.filter(p => p.imp);
        
        // --- SCORE CALCULATION ---
        let resultMsg = "";
        if (kickedPlayer.imp) {
            resultMsg = "✅ They were an Imposter! (Innocents +100)";
            gameState.players.forEach(p => { if(!p.imp) scores[p.id] += 100; });
        } else {
            resultMsg = "❌ They were Innocent. (Imposters +200)";
            gameState.players.forEach(p => { if(p.imp) scores[p.id] += 200; });
        }
        
        const box = document.getElementById('reveal-box');
        box.classList.remove('hidden');
        box.innerHTML = `
            <h2 style="text-align:center; color:white;">Player ${kickedId} was kicked out!</h2>
            <p style="text-align:center; font-size:1.2rem;">${resultMsg}</p>
            <hr style="border:1px solid rgba(255,255,255,0.1); margin:15px 0;">
            <div><strong>Secret Word:</strong> <span style="color:var(--neon-blue)">${currentWord}</span></div>
            <div style="margin-top:10px;"><strong>Imposters:</strong> ${imps.map(i => `<span class="imp-name">Player ${i.id}</span>`).join(", ")}</div>
        `;
        document.getElementById('reset-btn').classList.remove('hidden');
        playBuzzer(200, 1.0, 'sawtooth');
        updateScoreDisplay();
    }

    function updateScoreDisplay() {
        const sb = document.getElementById('scoreboard');
        sb.classList.remove('hidden');
        sb.innerHTML = Object.keys(scores).map(id => `
            <div class="score-item">P${id}<span class="score-val">${scores[id]}</span></div>
        `).join("");
    }

    function backToMenu() {
        document.getElementById('page-discussion').classList.add('hidden');
        document.getElementById('reveal-box').classList.add('hidden');
        document.getElementById('reset-btn').classList.add('hidden');
        document.getElementById('page-categories').classList.remove('hidden');
        document.getElementById('debate-ui').classList.remove('hidden');
        document.getElementById('phase-title').innerText = "DEBATE";
        updateScoreDisplay();
    }
</script>
</body>
</html>
