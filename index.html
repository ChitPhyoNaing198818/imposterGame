<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imposter Myanmar Game</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --neon-purple: #bc13fe;
            --bg-dark: #05050b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', 'Pyidaungsu', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.05) 0%, transparent 40%);
        }

        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; z-index: 10; }
        .hidden { display: none !important; }

        /* Page Titles */
        h2.title { text-align: center; color: var(--neon-blue); letter-spacing: 4px; font-weight: 900; margin-bottom: 25px; text-shadow: 0 0 10px rgba(0,242,255,0.5); }

        /* CATEGORY PAGE GRID */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .cat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cat-card.selected {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .cat-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .cat-name { font-size: 0.75rem; font-weight: bold; color: #ccc; }
        .selected .cat-name { color: var(--neon-blue); }

        /* SETTINGS PANELS */
        .settings-box {
            background: var(--glass);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        
        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
            color: white; padding: 12px; border-radius: 12px; font-size: 1rem; box-sizing: border-box;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--neon-blue), #00a2ff);
            color: black; border: none; padding: 18px; border-radius: 15px;
            width: 100%; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3);
        }

        /* NEW CARD DESIGN */
        .card-scene { perspective: 1000px; height: 380px; margin: 30px 0; }
        .card {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid rgba(0, 242, 255, 0.2);
            background: linear-gradient(135deg, #0a0a15 0%, #050507 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-front { color: var(--neon-blue); }
        .card-back {
            transform: rotateY(180deg);
            border-color: var(--neon-purple);
            background: linear-gradient(135deg, #0f0515 0%, #050507 100%);
        }

        .scan-line {
            width: 100%; height: 2px; background: var(--neon-blue);
            position: absolute; top: 0; left: 0;
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        #word-text { font-size: 2.8rem; font-weight: 900; margin: 0; letter-spacing: 2px; }
        #hint-text { color: #888; font-size: 0.9rem; margin-top: 10px; }

        /* HUD */
        .player-info { text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--neon-blue); }
        
        /* TIMER */
        .timer-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--neon-red);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; margin: 20px auto;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
        }

    </style>
</head>
<body>

    <!-- PAGE 1: CATEGORY SELECTION -->
    <div id="page-categories" class="container">
        <h2 class="title"> CATEGORY ရွေးပါ</h2>
        <div class="category-grid" id="cat-grid">
            <!-- Dynamically injected -->
        </div>
        
        <div class="settings-box">
            <div class="input-row">
                <div class="input-group">
                    <label>Players</label>
                    <input type="number" id="playerCount" value="4">
                </div>
                <div class="input-group">
                    <label>Imposters</label>
                    <input type="number" id="imposterCount" value="1">
                </div>
            </div>
            <div class="input-group">
                <label>ဆွေးနွေးချိန်</label>
                <input type="number" id="discTime" value="60">
            </div>
        </div>

        <button class="btn-main" onclick="initGame()">START MISSION</button>
    </div>

    <!-- PAGE 2: GAMEPLAY -->
    <div id="page-game" class="container hidden">
        <div class="player-info" id="player-label">PLAYER 1</div>
        
        <div class="card-scene">
            <div class="card" id="main-card" onclick="flipCard()">
                <div class="card-face card-front">
                    <div class="scan-line"></div>
                    <div style="font-size: 4rem;">🔐</div>
                    <p style="text-transform: uppercase; font-size: 0.8rem; margin-top: 20px; letter-spacing: 2px;">Tap to Decrypt</p>
                </div>
                <div class="card-face card-back">
                    <p id="word-text">APPLE</p>
                    <p id="hint-text">Category Hint Here</p>
                </div>
            </div>
        </div>

        <button class="btn-main hidden" id="next-player-btn" onclick="goToNextPlayer()">NEXT PLAYER ➔</button>
    </div>

    <!-- PAGE 3: DISCUSSION -->
    <div id="page-discussion" class="container hidden" style="text-align: center;">
        <h2 class="title" style="color: var(--neon-red);">DEBATE TIME</h2>
        <div class="settings-box">
            <p style="color: #888; font-size: 0.8rem;">First to Speak:</p>
            <h1 id="starter-name" style="margin: 10px 0; font-size: 2rem;">Player 1</h1>
        </div>
        <div class="timer-circle" id="timer-val">60</div>
        <button class="btn-main" onclick="location.reload()">RESET GAME</button>
    </div>

<script>
    const allCategories = {
        mix: { n: "Random Mix", i: "🎲", list: [] },
        fest: { n: "Festivals", i: "🎆", list: ["သင်္ကြန်", "သီတင်းကျွတ်", "တန်ဆောင်တိုင်", "ကဆုန်ညောင်ရေသွန်း", "ဖောင်တော်ဦး"], h: "မြန်မာ့ရိုးရာပွဲ" },
        anim: { n: "Animals", i: "🐘", list: ["ဆင်", "ကျား", "ခြင်္သေ့", "ဒေါင်း", "မျောက်", "မြွေ", "ကြောင်", "ခွေး"], h: "တိရစ္ဆာန်" },
        food: { n: "Local Food", i: "🍜", list: ["မုန့်ဟင်းခါး", "အုန်းနို့ခေါက်ဆွဲ", "လက်ဖက်သုပ်", "ရှမ်းခေါက်ဆွဲ"], h: "စားစရာ" },
        place: { n: "Places", i: "⛩️", list: ["ရွှေတိဂုံ", "ပုဂံ", "အင်းလေး", "ကျိုက်ထီးရိုး", "ပြင်ဦးလွင်"], h: "နေရာ" },
        job: { n: "Jobs", i: "💼", list: ["ဆရာဝန်", "အင်ဂျင်နီယာ", "စစ်သား", "ရဲ", "ကျောင်းဆရာ"], h: "အလုပ်အကိုင်" },
        tech: { n: "Tech", i: "💻", list: ["iPhone", "Facebook", "Laptop", "Internet", "ChatGPT"], h: "နည်းပညာ" },
        sport: { n: "Sports", i: "⚽", list: ["ဘောလုံး", "ခြင်းလုံး", "လက်ဝှေ့", "ရေကူး", "တင်းနစ်"], h: "အားကစား" },
        movie: { n: "Movies", i: "🎬", list: ["Spider-Man", "Titanic", "Avatar", "Batman", "Frozen"], h: "ရုပ်ရှင်" },
        celeb: { n: "Celebs", i: "🌟", list: ["စိုင်းစိုင်း", "နေတိုး", "ဖွေးဖွေး", "ဝတ်မှုံရွှေရည်"], h: "အနုပညာရှင်" },
        drink: { n: "Drinks", i: "🍹", list: ["ကော်ဖီ", "လက်ဖက်ရည်", "ဘီယာ", "ဝိုင်", "နွားနို့"], h: "သောက်စရာ" },
        body: { n: "Body", i: "🧠", list: ["ဦးနှောက်", "နှလုံး", "မျက်လုံး", "ကျောရိုး", "အဆုတ်"], h: "ခန္ဓာကိုယ်" },
        anime: { n: "Anime", i: "👺", list: ["Naruto", "One Piece", "Dragon Ball", "Death Note"], h: "ဂျပန်ကာတွန်း" },
        brand: { n: "Brands", i: "💎", list: ["Samsung", "Nike", "Adidas", "Toyota", "Coca-Cola"], h: "ကမ္ဘာကျော်တံဆိပ်" },
        travel: { n: "Travel", i: "✈️", list: ["Passport", "Suitcase", "Hotel", "Beach", "Airport"], h: "ခရီးသွားခြင်း" }
    };

    let selectedCat = 'mix';
    let gameState = { players: [], current: 0, isFlipped: false };

    // Initialize Category Grid
    const grid = document.getElementById('cat-grid');
    Object.keys(allCategories).forEach(key => {
        const item = allCategories[key];
        const div = document.createElement('div');
        div.className = `cat-card ${key === 'mix' ? 'selected' : ''}`;
        div.id = `cat-${key}`;
        div.innerHTML = `<span class="cat-icon">${item.i}</span><span class="cat-name">${item.n}</span>`;
        div.onclick = () => selectCategory(key);
        grid.appendChild(div);
    });

    function selectCategory(key) {
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
        document.getElementById(`cat-${key}`).classList.add('selected');
        selectedCat = key;
    }

    function initGame() {
        const pCount = parseInt(document.getElementById('playerCount').value);
        const iCount = parseInt(document.getElementById('imposterCount').value);
        
        let targetKey = selectedCat;
        if(targetKey === 'mix') {
            const keys = Object.keys(allCategories).filter(k => k !== 'mix');
            targetKey = keys[Math.floor(Math.random() * keys.length)];
        }

        const category = allCategories[targetKey];
        const secretWord = category.list[Math.floor(Math.random() * category.list.length)];

        let deck = [];
        for(let i=0; i < (pCount - iCount); i++) deck.push({ w: secretWord, h: "စကားလုံးကို မှတ်ထားပါ။", imp: false });
        for(let i=0; i < iCount; i++) deck.push({ w: "IMPOSTER", h: `Hint: ${category.h}`, imp: true });

        gameState.players = deck.sort(() => Math.random() - 0.5);
        gameState.current = 0;

        document.getElementById('page-categories').classList.add('hidden');
        document.getElementById('page-game').classList.remove('hidden');
        updateGameUI();
    }

    function updateGameUI() {
        gameState.isFlipped = false;
        const p = gameState.players[gameState.current];
        document.getElementById('player-label').innerText = `PLAYER ${gameState.current + 1}`;
        document.getElementById('word-text').innerText = p.w;
        document.getElementById('hint-text').innerText = p.h;
        document.getElementById('word-text').style.color = p.imp ? 'var(--neon-red)' : 'var(--neon-blue)';
        document.getElementById('main-card').classList.remove('is-flipped');
        document.getElementById('next-player-btn').classList.add('hidden');
    }

    function flipCard() {
        if (!gameState.isFlipped) {
            gameState.isFlipped = true;
            document.getElementById('main-card').classList.add('is-flipped');
            setTimeout(() => {
                document.getElementById('next-player-btn').classList.remove('hidden');
            }, 3000);
        }
    }

    function goToNextPlayer() {
        gameState.current++;
        if (gameState.current < gameState.players.length) {
            updateGameUI();
        } else {
            showDiscussion();
        }
    }

    function showDiscussion() {
        document.getElementById('page-game').classList.add('hidden');
        document.getElementById('page-discussion').classList.remove('hidden');
        document.getElementById('starter-name').innerText = `Player ${Math.floor(Math.random() * gameState.players.length) + 1}`;
        
        let time = parseInt(document.getElementById('discTime').value);
        const timerEl = document.getElementById('timer-val');
        const clock = setInterval(() => {
            time--;
            timerEl.innerText = time;
            if(time <= 0) { clearInterval(clock); timerEl.innerText = "!!"; }
        }, 1000);
    }
</script>
</body>
</html>
